# ─────────────────────────────────────────────────────────────────
# CareerSignal — Docker Compose
#
# Services :
#   app                → Streamlit UI
#   api                → FastAPI + Swagger
#   autopublish-worker → worker d'autopublication LinkedIn
#
# Usage :
#   docker compose up
#   docker compose --profile automation up
# ─────────────────────────────────────────────────────────────────

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: career-signal-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - DATABASE_PATH=/app/data/app.db
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - DISPLAY=:99
    volumes:
      - ./data:/app/data
      - ./data/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - agent-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: career-signal-api
    restart: unless-stopped
    entrypoint: ["/entrypoints/api.sh"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - DATABASE_PATH=/app/data/app.db
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - DISPLAY=:99
    volumes:
      - ./data:/app/data
      - ./data/logs:/app/logs
    networks:
      - agent-network

  autopublish-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: career-signal-autopublish
    profiles:
      - automation
    restart: unless-stopped
    entrypoint: ["/entrypoints/worker.sh"]
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - DATABASE_PATH=/app/data/app.db
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - DISPLAY=:99
    volumes:
      - ./data:/app/data
      - ./data/logs:/app/logs
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
