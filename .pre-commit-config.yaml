# ─────────────────────────────────────────────────────────────────
# Pre-commit hooks — Content Agent System
# Installation : make dev-install  (installe pre-commit)
# Activation   : pre-commit install
# Run manuel   : make precommit
# ─────────────────────────────────────────────────────────────────

repos:
  # ── Hooks génériques ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key        # bloque les secrets
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  # ── Ruff : lint + format ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ── Mypy : typage statique ────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies: ["anthropic", "python-dotenv"]
        args: ["--ignore-missing-imports", "--no-strict-optional"]
        files: ^(agents|core|pipelines|tools)/
